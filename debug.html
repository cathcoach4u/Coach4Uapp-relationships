<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Coach4U Debug</title>
</head>
<body>
  <h1>Debug Page</h1>
  <pre id="log"></pre>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const log = document.getElementById('log');
    function l(msg) { log.textContent += msg + '\n'; }

    try {
      l('1. supabase global type: ' + typeof supabase);
      l('2. supabase keys: ' + Object.keys(supabase).join(', '));

      const { createClient } = supabase;
      l('3. createClient type: ' + typeof createClient);

      const client = createClient(
        'https://uoixetfvboevjxlkfyqy.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVvaXhldGZ2Ym9ldmp4bGtmeXF5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NDY2ODAsImV4cCI6MjA5MDQyMjY4MH0.ZXYJVdvcj70aGMH1FAixIr0hNCaCDSYLEL93hHVCGDU'
      );
      l('4. client created: ' + typeof client);
      l('5. client.rpc type: ' + typeof client.rpc);

      client.rpc('verify_access_code', { input_code: 'Coach4U2026' })
        .then(({ data, error }) => {
          if (error) {
            l('6. RPC ERROR: ' + error.message);
          } else {
            l('6. RPC result: ' + data);
            l('7. SUCCESS - access code works!');
          }
        });
    } catch (err) {
      l('ERROR: ' + err.message);
    }
  </script>
</body>
</html>
