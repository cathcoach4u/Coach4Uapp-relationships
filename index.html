<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coach4U — Resource Library</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#3b82f6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Coach4U">
  <link rel="apple-touch-icon" href="assets/coach4u-icon.jpeg">
</head>
<body>
  <main class="login-page">
    <div class="card login-card">
      <div class="login-logo">
        <img src="assets/coach4u-logo.jpg" alt="Coach4U" height="64">
      </div>

      <h1 class="login-title">Resource Library</h1>
      <p class="login-subtitle">
        Welcome! Enter the access code provided by your coach to view your resources.
      </p>

      <form id="login-form" class="login-form" novalidate>
        <div class="form-group">
          <label for="access-code" class="form-label">Access Code</label>
          <input
            type="password"
            id="access-code"
            class="form-input"
            placeholder="Enter your access code"
            autocomplete="off"
            required
          >
          <div id="login-error" class="form-error" role="alert"></div>
        </div>

        <button type="submit" id="login-btn" class="btn btn-primary btn-block">
          Access Resources
        </button>
      </form>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // --- Supabase init (same pattern as debug.html) ---
    const { createClient } = supabase;
    const db = createClient(
      'https://uoixetfvboevjxlkfyqy.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVvaXhldGZ2Ym9ldmp4bGtmeXF5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NDY2ODAsImV4cCI6MjA5MDQyMjY4MH0.ZXYJVdvcj70aGMH1FAixIr0hNCaCDSYLEL93hHVCGDU'
    );

    // --- Session management ---
    const SESSION_KEY = 'coach4u_access';
    const SESSION_DURATION_MS = 24 * 60 * 60 * 1000;

    function grantAccess() {
      sessionStorage.setItem(SESSION_KEY, JSON.stringify({ granted: true, timestamp: Date.now() }));
    }

    function hasAccess() {
      const raw = sessionStorage.getItem(SESSION_KEY);
      if (!raw) return false;
      try {
        const s = JSON.parse(raw);
        if (!s.granted || Date.now() - s.timestamp > SESSION_DURATION_MS) {
          sessionStorage.removeItem(SESSION_KEY);
          return false;
        }
        return true;
      } catch { return false; }
    }

    // --- Already logged in? ---
    if (hasAccess()) {
      window.location.href = 'portal.html';
    }

    // --- Login form ---
    const form = document.getElementById('login-form');
    const input = document.getElementById('access-code');
    const errorEl = document.getElementById('login-error');
    const submitBtn = document.getElementById('login-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const code = input.value.trim();

      if (!code) {
        errorEl.textContent = 'Please enter an access code.';
        errorEl.classList.add('visible');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Verifying...';
      errorEl.classList.remove('visible');

      try {
        const { data, error } = await db.rpc('verify_access_code', { input_code: code });

        if (error) throw error;

        if (data === true) {
          grantAccess();
          window.location.href = 'portal.html';
        } else {
          errorEl.textContent = 'Invalid access code. Please try again.';
          errorEl.classList.add('visible');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Access Resources';
          input.value = '';
          input.focus();
        }
      } catch (err) {
        console.error('Login error:', err);
        errorEl.textContent = 'Something went wrong. Please try again.';
        errorEl.classList.add('visible');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Access Resources';
      }
    });
  </script>
</body>
</html>
