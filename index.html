<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coach4U — Relationships</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#003366">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Coach4U">
  <link rel="apple-touch-icon" href="assets/coach4u-icon.jpeg">
  <style>
    body { display: flex; align-items: center; justify-content: center; padding: 16px; }
    .form-card { margin: 0; }
  </style>
</head>
<body>
  <div class="form-card">
    <img src="assets/coach4u-logo.jpg" alt="Coach4U" style="height:64px;width:auto;margin:0 auto 24px;">
    <h1>Resource Library</h1>
    <p class="subtitle">Sign in to access your coaching resources.</p>
    <form id="login-form" novalidate>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required autocomplete="current-password">
      </div>
      <div id="login-error" class="alert alert-error" style="display:none" role="alert"></div>
      <button type="submit" id="login-btn" class="btn btn-primary btn-full">Sign In</button>
      <p style="text-align:center;margin-top:14px;font-size:0.875rem">
        <a href="forgot-password.html">Forgot password?</a>
      </p>
    </form>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    const supabase = createClient(
      'https://eekefsuaefgpqmjdyniy.supabase.co',
      'sb_publishable_pcXHwQVMpvEojb4K3afEMw_RMvgZM-Y'
    );

    const { data: { session } } = await supabase.auth.getSession();
    if (session) window.location.href = 'portal.html';

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errEl    = document.getElementById('login-error');
      const btn      = document.getElementById('login-btn');

      btn.disabled = true;
      btn.textContent = 'Signing in...';
      errEl.style.display = 'none';

      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) {
        errEl.textContent = error.message;
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      } else {
        window.location.href = 'portal.html';
      }
    });
  </script>
</body>
</html>
