<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coach4U — Relationships</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#003366">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Coach4U">
  <link rel="apple-touch-icon" href="assets/coach4u-icon.jpeg">
</head>
<body>
  <main class="login-page">
    <div class="card login-card">
      <div class="login-logo">
        <img src="assets/coach4u-logo.jpg" alt="Coach4U" height="64">
      </div>
      <h1 class="login-title">Relationships</h1>
      <p class="login-subtitle">Sign in to access your relationship resources.</p>
      <form id="login-form" class="login-form" novalidate>
        <div class="form-group">
          <label for="email" class="form-label">Email</label>
          <input type="email" id="email" class="form-input" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <input type="password" id="password" class="form-input" required autocomplete="current-password">
        </div>
        <div id="message" class="form-error" role="alert"></div>
        <button type="submit" id="login-btn" class="btn btn-primary btn-block">Sign In</button>
        <p style="text-align:center;margin-top:14px;font-size:0.875rem">
          <a href="forgot-password.html">Forgot password?</a>
        </p>
      </form>
    </div>
  </main>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    const supabase = createClient(
      'https://eekefsuaefgpqmjdyniy.supabase.co',
      'sb_publishable_pcXHwQVMpvEojb4K3afEMw_RMvgZM-Y'
    );

    const { data: { session } } = await supabase.auth.getSession();
    if (session) window.location.href = 'portal.html';

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errEl    = document.getElementById('message');
      const btn      = document.getElementById('login-btn');

      btn.disabled = true;
      btn.textContent = 'Signing in...';
      errEl.classList.remove('visible');

      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) {
        errEl.textContent = error.message;
        errEl.classList.add('visible');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      } else {
        window.location.href = 'portal.html';
      }
    });
  </script>
</body>
</html>
