<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Relationship Coach — Specialised Support</title>
  <link rel="stylesheet" href="css/style.css">
  <meta name="theme-color" content="#003366">
  <style>body{visibility:hidden}</style>
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    const SUPABASE_URL      = 'https://eekefsuaefgpqmjdyniy.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_pcXHwQVMpvEojb4K3afEMw_RMvgZM-Y';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const { data: { user }, error: userError } = await supabase.auth.getUser();
    if (!user || userError) {
      window.location.href = 'index.html';
    } else {
      const { data: profile } = await supabase
        .from('users')
        .select('membership_status')
        .eq('id', user.id)
        .single();
      if (!profile || profile.membership_status !== 'active') {
        window.location.href = 'inactive.html';
      } else {
        document.body.style.visibility = 'visible';
        document.getElementById('signOutBtn').addEventListener('click', async () => {
          await supabase.auth.signOut();
          window.location.href = 'index.html';
        });
      }
    }
  </script>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="header-left">
        <a href="index.html" class="header-back">← Dashboard</a>
        <span class="header-title">Specialised Support</span>
      </div>
      <button id="signOutBtn" class="sign-out-btn">Sign Out</button>
    </div>
  </header>

  <div class="container">
    <p class="page-subtitle">Coaching resources and worksheets</p>

    <div class="resources-grid">
      <div class="resource-item">
        <strong style="color:var(--primary);font-size:14px;line-height:1.4;">ADHD and Your Relationship</strong>
        <p style="font-size:12px;color:var(--text-muted);margin:0;">Explore how ADHD affects relationship patterns, communication, and emotional safety, with a strengths-based framework for moving forward.</p>
                <a href="resources/relationships/adhd-and-your-relationship.html" class="btn btn-primary">View</a>
      </div>
    </div>
  </div>


</body>
</html>
