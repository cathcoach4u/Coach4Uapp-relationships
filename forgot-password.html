<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — Coach4U</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <main class="login-page">
    <div class="card login-card">
      <div class="login-logo">
        <img src="assets/coach4u-logo.jpg" alt="Coach4U" height="64">
      </div>
      <h1 class="login-title">Forgot Password</h1>
      <p class="login-subtitle">Enter your email and we will send you a reset link.</p>
      <form id="forgot-form" class="login-form" novalidate>
        <div class="form-group">
          <label for="email" class="form-label">Email address</label>
          <input type="email" id="email" class="form-input" required>
        </div>
        <div id="message" class="form-error" role="alert"></div>
        <button type="submit" id="submit-btn" class="btn btn-primary btn-block">Send Reset Link</button>
        <p style="text-align:center;margin-top:14px;font-size:0.875rem">
          <a href="index.html">Back to sign in</a>
        </p>
      </form>
    </div>
  </main>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    const supabase = createClient(
      'https://eekefsuaefgpqmjdyniy.supabase.co',
      'sb_publishable_pcXHwQVMpvEojb4K3afEMw_RMvgZM-Y'
    );

    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const msgEl = document.getElementById('message');
      const btn   = document.getElementById('submit-btn');

      btn.disabled = true;
      btn.textContent = 'Sending...';
      msgEl.classList.remove('visible');

      // Use window.location.href (not origin) to preserve the path for Supabase redirect matching
      const redirectTo = window.location.href.replace('forgot-password.html', 'reset-password.html');

      const { error } = await supabase.auth.resetPasswordForEmail(email, { redirectTo });
      if (error) {
        msgEl.textContent = error.message;
        msgEl.classList.add('visible');
        btn.disabled = false;
        btn.textContent = 'Send Reset Link';
      } else {
        msgEl.style.color = '#276749';
        msgEl.textContent = 'Check your email for a reset link.';
        msgEl.classList.add('visible');
      }
    });
  </script>
</body>
</html>
