<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — Coach4U</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; padding: 16px; }
    .form-card { margin: 0; }
  </style>
</head>
<body>
  <div class="form-card">
    <img src="assets/coach4u-logo.jpg" alt="Coach4U" style="height:64px;width:auto;margin:0 auto 24px;">
    <h1>Forgot Password</h1>
    <p class="subtitle">Enter your email and we'll send you a reset link.</p>
    <form id="forgot-form" novalidate>
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" required>
      </div>
      <div id="msg" class="alert" style="display:none" role="alert"></div>
      <button type="submit" id="submit-btn" class="btn btn-primary btn-full">Send Reset Link</button>
      <p style="text-align:center;margin-top:14px;font-size:0.875rem">
        <a href="index.html">Back to sign in</a>
      </p>
    </form>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    const supabase = createClient(
      'https://eekefsuaefgpqmjdyniy.supabase.co',
      'sb_publishable_pcXHwQVMpvEojb4K3afEMw_RMvgZM-Y'
    );

    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const msgEl = document.getElementById('msg');
      const btn   = document.getElementById('submit-btn');

      btn.disabled = true;
      btn.textContent = 'Sending...';
      msgEl.style.display = 'none';

      const redirectTo = window.location.href.replace('forgot-password.html', 'reset-password.html');

      const { error } = await supabase.auth.resetPasswordForEmail(email, { redirectTo });
      msgEl.style.display = 'block';
      if (error) {
        msgEl.className = 'alert alert-error';
        msgEl.textContent = error.message;
        btn.disabled = false;
        btn.textContent = 'Send Reset Link';
      } else {
        msgEl.className = 'alert alert-success';
        msgEl.textContent = 'Check your email for a reset link.';
      }
    });
  </script>
</body>
</html>
