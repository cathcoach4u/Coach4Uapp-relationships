<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Coach4U</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <main class="login-page">
    <div class="card login-card">
      <div class="login-logo">
        <img src="assets/coach4u-logo.jpg" alt="Coach4U" height="64">
      </div>
      <h1 class="login-app-name">Relationships</h1>
      <h2 class="login-page-title">Set new password</h2>
      <p class="login-subtitle">Enter your new password below.</p>
      <form id="reset-form" class="login-form" novalidate>
        <div class="form-group">
          <label for="password" class="form-label">New password</label>
          <div class="password-wrapper">
            <input type="password" id="password" class="form-input" required minlength="8">
            <button type="button" class="password-toggle" id="password-toggle">Show</button>
          </div>
        </div>
        <div id="message" class="form-error" role="alert"></div>
        <button type="submit" id="submit-btn" class="btn btn-primary btn-block">Update Password</button>
      </form>
    </div>
  </main>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    const supabase = createClient(
      'https://eekefsuaefgpqmjdyniy.supabase.co',
      'sb_publishable_pcXHwQVMpvEojb4K3afEMw_RMvgZM-Y'
    );

    document.getElementById('password-toggle').addEventListener('click', () => {
      const input = document.getElementById('password');
      const toggle = document.getElementById('password-toggle');
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      toggle.textContent = isHidden ? 'Hide' : 'Show';
    });

    // Supabase appends the token as a hash fragment — the client picks it up automatically
    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const msgEl    = document.getElementById('message');
      const btn      = document.getElementById('submit-btn');

      btn.disabled = true;
      btn.textContent = 'Updating...';

      const { error } = await supabase.auth.updateUser({ password });
      if (error) {
        msgEl.textContent = error.message;
        msgEl.classList.add('visible');
        btn.disabled = false;
        btn.textContent = 'Update Password';
      } else {
        msgEl.style.color = '#276749';
        msgEl.textContent = 'Password updated. Redirecting to sign in...';
        msgEl.classList.add('visible');
        setTimeout(() => window.location.href = 'index.html', 2000);
      }
    });
  </script>
</body>
</html>
