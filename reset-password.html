<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Coach4U</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; padding: 16px; }
    .form-card { margin: 0; }
  </style>
</head>
<body>
  <div class="form-card">
    <img src="assets/coach4u-logo.jpg" alt="Coach4U" style="height:64px;width:auto;margin:0 auto 24px;">
    <h1>Reset Password</h1>
    <p class="subtitle">Enter your new password below.</p>
    <form id="reset-form" novalidate>
      <div class="form-group">
        <label for="password">New password</label>
        <input type="password" id="password" required minlength="8">
      </div>
      <div id="msg" class="alert" style="display:none" role="alert"></div>
      <button type="submit" id="submit-btn" class="btn btn-primary btn-full">Update Password</button>
    </form>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    const supabase = createClient(
      'https://eekefsuaefgpqmjdyniy.supabase.co',
      'sb_publishable_pcXHwQVMpvEojb4K3afEMw_RMvgZM-Y'
    );

    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const msgEl    = document.getElementById('msg');
      const btn      = document.getElementById('submit-btn');

      btn.disabled = true;
      btn.textContent = 'Updating...';

      const { error } = await supabase.auth.updateUser({ password });
      msgEl.style.display = 'block';
      if (error) {
        msgEl.className = 'alert alert-error';
        msgEl.textContent = error.message;
        btn.disabled = false;
        btn.textContent = 'Update Password';
      } else {
        msgEl.className = 'alert alert-success';
        msgEl.textContent = 'Password updated. Redirecting to sign in...';
        setTimeout(() => window.location.href = 'index.html', 2000);
      }
    });
  </script>
</body>
</html>
